<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quiet Change — multi-year</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --card: #1a1d24; --border: #2a2f3a;
    --text: #e6e8eb; --muted: #8a93a3; --accent: #5aa9ff;
    --pos: #2ecc71; --neg: #e74c3c; --flat: #f1c40f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
  }
  h1 { margin: 0 0 8px; font-size: 22px; }
  .sub { color: var(--muted); margin-bottom: 20px; font-size: 13px; }
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: end;
    background: var(--card); padding: 16px; border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 20px;
  }
  .controls label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .controls input {
    background: #0a0c10; color: var(--text); border: 1px solid var(--border);
    padding: 8px 10px; border-radius: 6px; font: inherit;
  }
  .controls input[type=text] { width: 380px; }
  .controls input[type=number] { width: 90px; }
  button {
    background: var(--accent); color: #061018; border: 0; font-weight: 600;
    padding: 9px 16px; border-radius: 6px; cursor: pointer; font: inherit;
  }
  button:disabled { opacity: 0.5; cursor: wait; }
  .status { margin-bottom: 16px; color: var(--muted); font-size: 13px; }
  .fetched { margin: -10px 0 16px; color: var(--muted); font-size: 11px; opacity: .7; }
  .fetched.stale { color: var(--neg); opacity: 1; font-weight: 600; }

  /* "Run accuracy tests" checkbox */
  .toggle-switch { display: inline-flex; align-items: center; gap: 8px;
                   color: var(--text); font-size: 13px; cursor: pointer;
                   user-select: none; padding: 9px 14px; border: 1px solid var(--border);
                   border-radius: 6px; background: #0a0c10; }
  .toggle-switch input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

  /* Per-pair test result panel */
  .test-panel { margin-top: 12px; padding: 10px 12px; border-radius: 6px;
                background: #0a0c10; border-left: 3px solid var(--border);
                font-size: 12px; }
  .test-panel.pass    { border-left-color: var(--pos); }
  .test-panel.partial { border-left-color: var(--flat); }
  .test-panel.fail    { border-left-color: var(--neg); }
  .test-panel-head { display: flex; align-items: center; gap: 10px;
                     font-weight: 700; font-size: 12px; }
  .test-panel-head .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .test-panel.pass    .dot { background: var(--pos); }
  .test-panel.partial .dot { background: var(--flat); }
  .test-panel.fail    .dot { background: var(--neg); }
  .test-panel-list { margin: 8px 0 0; padding-left: 0; list-style: none; }
  .test-panel-list li { padding: 3px 0; display: flex; gap: 8px; align-items: flex-start; }
  .test-panel-list .icon { flex: 0 0 14px; font-weight: 800; line-height: 1.4; }
  .test-panel-list .ok   .icon { color: var(--pos); }
  .test-panel-list .bad  .icon { color: var(--neg); }
  .test-panel-list .label { color: var(--text); }
  .test-panel-list .detail { color: var(--neg); font-size: 11px; margin-left: 4px; }
  .test-evidence {
    margin: 4px 0 4px 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #060810;
    overflow: hidden;
  }
  .test-evidence table {
    width: 100%; border-collapse: collapse; font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .test-evidence td {
    padding: 3px 8px; border-bottom: 1px solid var(--border);
  }
  .test-evidence td:first-child { color: var(--muted); width: 45%; }
  .test-evidence td:last-child  { color: var(--text); font-weight: 600; }
  .test-evidence tr:last-child td { border-bottom: 0; }
  .evidence-toggle {
    margin-left: 22px; margin-top: 2px; font-size: 11px;
    color: var(--accent); cursor: pointer; user-select: none;
    background: none; border: 0; padding: 0; font-family: inherit;
  }
  .evidence-toggle:hover { text-decoration: underline; }

  /* Segment breakdown — collapsible per pair */
  .segment-section { margin-top: 14px; }
  .segment-toggle {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 0; padding: 6px 0;
    color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; width: 100%; text-align: left;
  }
  .segment-toggle:hover { color: var(--text); }
  .segment-toggle .chev {
    font-size: 11px; transition: transform .15s ease;
    display: inline-block; color: var(--accent);
  }
  .segment-section.open .segment-toggle .chev { transform: rotate(90deg); }
  .segment-body { display: none; padding-top: 4px; }
  .segment-section.open .segment-body { display: block; }
  .segment-section table { width: 100%; border-collapse: collapse;
                            font-size: 12px; font-variant-numeric: tabular-nums; }
  .segment-section th { text-align: left; color: var(--muted);
                         font-size: 11px; text-transform: uppercase;
                         padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .segment-section td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .segment-section td.num { text-align: right; }
  .segment-section th.num { text-align: right; }
  .seg-pos { color: var(--pos); }
  .seg-neg { color: var(--neg); }
  .company {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 14px; overflow: hidden;
  }
  .toggle {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .toggle:hover { background: #20242d; }
  .toggle .left { display: flex; gap: 12px; align-items: baseline; }
  .toggle h2 { margin: 0; font-size: 16px; font-weight: 600; }
  .toggle .code { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  .toggle .chev { color: var(--muted); transition: transform .15s; }
  .open .chev { transform: rotate(90deg); }
  .body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .open .body { display: block; }
  .chart-wrap { background: #0a0c10; border-radius: 6px; padding: 12px; margin: 14px 0; }
  .composition-chart-wrap { padding: 8px; margin: 6px 0 8px; }
  .composition-row { font-size: 12px; color: var(--muted); margin: 4px 0 6px;
                     line-height: 1.5; }
  .composition-row .composition-label { font-weight: 600; color: #c8ccd4;
                                        margin-right: 6px; text-transform: uppercase;
                                        letter-spacing: .04em; font-size: 11px; }
  .composition-row .seg-share { color: #c8ccd4; font-variant-numeric: tabular-nums; }
  .composition-row .seg-share .arrow { color: var(--muted); margin: 0 2px; }
  .div-flag-badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
                    font-size: 10px; font-weight: 700; letter-spacing: .04em;
                    background: rgba(241, 196, 15, .18); color: var(--flat);
                    margin-left: 6px; cursor: help; }
  /* Phase-match panel — appears beneath rationale only when the candidate
     has insufficient history for trajectory_similarity (Phase C v1). */
  .phase-match-panel { margin-top: 12px; padding: 10px 12px; border-radius: 6px;
                       background: rgba(155, 89, 182, .08);
                       border: 1px dashed rgba(155, 89, 182, .35);
                       font-size: 12px; }
  .phase-match-panel .phase-header { display: flex; align-items: center;
                                     gap: 10px; margin-bottom: 6px; }
  .phase-match-panel .phase-label { font-weight: 600; color: #c8b3e0;
                                    text-transform: uppercase; letter-spacing: .04em;
                                    font-size: 11px; }
  .phase-confidence-pill { display: inline-block; padding: 2px 8px;
                           border-radius: 4px; font-size: 11px; font-weight: 700;
                           background: rgba(155, 89, 182, .22); color: #d4b8ee;
                           cursor: help; font-variant-numeric: tabular-nums; }
  .phase-disclaimer { color: var(--muted); font-style: italic; font-size: 11px;
                      margin: 0 0 10px; line-height: 1.4; }
  .phase-prediction-band { color: #c8ccd4; margin: 4px 0 10px;
                           font-variant-numeric: tabular-nums; }
  .phase-prediction-band .pp-mid { font-weight: 700; color: #d4b8ee; }
  .phase-anchor-card { padding: 8px 10px; margin: 6px 0; border-radius: 4px;
                       background: rgba(0, 0, 0, .15);
                       border-left: 3px solid rgba(155, 89, 182, .5); }
  .phase-anchor-card .pa-head { display: flex; justify-content: space-between;
                                align-items: center; gap: 8px; }
  .phase-anchor-card .pa-name { font-weight: 600; color: #c8ccd4; }
  .phase-anchor-card .pa-window { color: var(--muted); font-size: 11px; }
  .phase-anchor-card .pa-cagr { font-variant-numeric: tabular-nums;
                                color: #c8ccd4; font-weight: 600; }
  .phase-anchor-card .pa-narr { color: #c8ccd4; margin-top: 4px;
                                font-size: 12px; line-height: 1.45; }
  .phase-traj-svg { display: block; margin: 4px 0 4px;
                    background: rgba(0, 0, 0, .25); border-radius: 3px; }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  td.num { text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .pos { background: rgba(46,204,113,.15); color: var(--pos); }
  .neg { background: rgba(231,76,60,.15); color: var(--neg); }
  .flat { background: rgba(241,196,15,.15); color: var(--flat); }
  .pair { padding: 12px 0; border-bottom: 1px dashed var(--border); }
  .pair:last-child { border-bottom: 0; }
  .pair h4 { margin: 0 0 6px; font-size: 13px; color: var(--muted); }
  .pair p { margin: 6px 0 0; font-size: 14px; }
  .explain-block { margin-top: 10px; }
  .explain-tag { display: inline-block; font-size: 10px; font-weight: 700;
                 letter-spacing: .06em; text-transform: uppercase;
                 padding: 2px 7px; border-radius: 3px; margin-right: 8px;
                 vertical-align: middle; }
  .explain-tag.simple   { background: rgba(46,204,113,.18); color: var(--pos); }
  .explain-tag.advanced { background: rgba(90,169,255,.18); color: var(--accent); }
  .explain-block p { margin: 4px 0 0; font-size: 14px; }
  .err { color: var(--neg); padding: 12px 18px; font-size: 13px; }
  details { margin-top: 6px; }
  summary { cursor: pointer; color: var(--accent); font-size: 12px; }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 18px; cursor: pointer; user-select: none;
    color: var(--muted); border-bottom: 2px solid transparent;
    font-weight: 600; font-size: 14px; margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .rel-pill { display: inline-block; min-width: 38px; text-align: center;
              padding: 3px 8px; border-radius: 12px; font-weight: 700;
              font-size: 12px; font-variant-numeric: tabular-nums; }
  .rel-hi { background: rgba(46,204,113,.20); color: var(--pos); }
  .rel-md { background: rgba(241,196,15,.20); color: var(--flat); }
  .rel-lo { background: rgba(231,76,60,.18); color: var(--neg); }

  /* Size-similarity badge — separate signal from relatedness; rendered in a
     muted neutral palette so it doesn't compete visually with the primary
     relatedness pill. Borderless ring + small label, professional report look. */
  .size-pill {
    display: inline-block; min-width: 38px; text-align: center;
    padding: 3px 8px; border-radius: 12px; font-weight: 600;
    font-size: 11px; font-variant-numeric: tabular-nums;
    background: rgba(148,163,184,.12); color: var(--muted);
    border: 1px solid rgba(148,163,184,.20);
  }
  .size-pill-label {
    display: inline-block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
    margin-left: 4px; font-weight: 500;
  }
  .scores-cell { display: flex; flex-direction: column; gap: 4px;
                 align-items: flex-start; }
  .scores-cell .row { display: flex; align-items: center; gap: 6px; }

  /* Combined score pill — accent-tinted to signal it's a derived/composite
     metric, not a primary signal. Tooltip exposes the weighting explicitly. */
  .combined-pill {
    display: inline-block; min-width: 38px; text-align: center;
    padding: 3px 8px; border-radius: 12px; font-weight: 600;
    font-size: 11px; font-variant-numeric: tabular-nums;
    background: rgba(99,102,241,.12); color: #a5b4fc;
    border: 1px dashed rgba(165,180,252,.30);
  }

  /* Detailed-view toggle — small inline switch styled like the level-toggle
     used elsewhere in the page so the visual language stays consistent. */
  .detail-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    margin: 6px 0 10px; font-size: 12px; color: var(--muted);
  }
  .detail-toggle button {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 3px 12px; font-size: 11px; cursor: pointer;
    font-weight: 500; transition: all .12s ease;
  }
  .detail-toggle button:hover { color: var(--text); border-color: var(--accent); }
  .detail-toggle button.on {
    background: rgba(99,102,241,.10); color: #a5b4fc;
    border-color: rgba(165,180,252,.40);
  }

  /* Default-hidden detailed-mode content. Shown when the parent .anchor-body
     gets the .detailed-on class via the toggle JS. Keeps the default view
     clean; one click of the toggle reveals revenue-chart + combined-pill. */
  .detailed-only { display: none; }
  .anchor-body.detailed-on .detailed-only { display: block; }
  .anchor-body.detailed-on .detailed-only-row { display: flex; }

  .revenue-compare-wrap {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin: 8px 0 14px;
  }
  .revenue-compare-wrap .chart-title {
    font-size: 12px; color: var(--muted); margin-bottom: 6px;
    font-weight: 600; letter-spacing: .02em;
  }
  .revenue-compare-wrap .legend-note {
    font-size: 10px; color: var(--muted); margin-top: 6px;
    font-style: italic;
  }
  .feature-chip { display: inline-block; background: #232732; color: var(--text);
                  padding: 3px 9px; border-radius: 12px; font-size: 12px;
                  margin: 2px 4px 2px 0; }
  .size-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px;
              background: #232732; color: var(--muted); margin-left: 6px;
              text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }

  /* Similar Company UX additions */
  .help-banner {
    margin: -8px 0 16px; padding: 10px 14px; background: #1a1d24;
    border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: 6px; color: var(--muted); font-size: 12px; line-height: 1.5;
  }
  .score-legend {
    display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 14px; align-items: center;
    color: var(--muted); font-size: 11px;
  }
  .score-legend .item {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px;
    border-radius: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
  }
  .score-legend .swatch {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .legend-hi .swatch { background: var(--pos); } .legend-hi { color: var(--pos); }
  .legend-md .swatch { background: var(--flat); } .legend-md { color: var(--flat); }
  .legend-lo .swatch { background: var(--neg); } .legend-lo { color: var(--neg); }

  .heatmap-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 18px;
  }
  .heatmap-section h3 { margin: 0 0 8px; font-size: 14px; color: var(--text); }
  .heatmap-wrap { overflow-x: auto; }
  .heatmap {
    border-collapse: collapse; font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .heatmap th, .heatmap td {
    padding: 5px 8px; border: 1px solid #0a0c10;
    text-align: center; min-width: 44px;
  }
  .heatmap th {
    background: #20242d; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: .03em; font-size: 10px;
  }
  .heatmap th.row-label, .heatmap td.row-label {
    text-align: left; background: #20242d; color: var(--text);
    font-weight: 600; min-width: 130px; white-space: nowrap;
  }
  .heatmap td.cell { color: #f7f9fa; font-weight: 600; cursor: default; }
  .heatmap td.cell.empty { background: #14181f; color: var(--muted); font-weight: 400; }

  /* Anchor card per-anchor bar chart */
  .anchor-bar-wrap {
    background: #0a0c10; border-radius: 6px; padding: 10px 12px; margin: 12px 0;
  }
  .anchor-bar-wrap .chart-title {
    font-size: 11px; color: var(--muted); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: .04em; font-weight: 600;
  }

  /* Future stock note */
  .future-note {
    margin-top: 6px; padding: 6px 10px; border-radius: 4px;
    background: rgba(241,196,15,.06); border-left: 3px solid var(--flat);
    font-size: 12px; color: var(--text);
  }
  .future-note .label {
    font-size: 10px; color: var(--flat); text-transform: uppercase;
    letter-spacing: .04em; font-weight: 700; display: block; margin-bottom: 3px;
  }

  /* Help cursor on tooltips */
  th[title], .tooltip-host { cursor: help; border-bottom: 1px dotted var(--muted); }

  /* Restated-basis note inside Quiet Change company cards */
  .restated-note {
    margin: 6px 0 12px; padding: 8px 12px; background: #1a1d24;
    border: 1px solid var(--border); border-left: 3px solid var(--flat);
    border-radius: 4px; color: var(--muted); font-size: 11px; line-height: 1.55;
  }

  .header-row { display: flex; justify-content: space-between; align-items: flex-start;
                gap: 16px; margin-bottom: 4px; }
  .lang-toggle { display: flex; gap: 0; border: 1px solid var(--border);
                 border-radius: 6px; overflow: hidden; flex-shrink: 0; }
  .lang-toggle button {
    background: transparent; color: var(--muted); border: 0; border-radius: 0;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; letter-spacing: .04em;
  }
  .lang-toggle button.active { background: var(--accent); color: #061018; }
  .lang-toggle button:not(.active):hover { color: var(--text); background: #20242d; }

  /* Simple/Advanced switch — same shape as .lang-toggle, different colour */
  .level-toggle { display: flex; gap: 0; border: 1px solid var(--border);
                  border-radius: 6px; overflow: hidden; }
  .level-toggle button {
    background: transparent; color: var(--muted); border: 0; border-radius: 0;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; letter-spacing: .04em;
  }
  .level-toggle button.active { background: var(--pos); color: #061018; }
  .level-toggle button.active.adv { background: var(--accent); }
  .level-toggle button:not(.active):hover { color: var(--text); background: #20242d; }

  /* Per-pair inline variant — sits on the explanation line, smaller. */
  .inline-level-toggle { display: inline-flex; vertical-align: middle;
                         margin-right: 10px; }
  .inline-level-toggle button { padding: 3px 9px; font-size: 11px;
                                letter-spacing: .03em; }
</style>
</head>
<body>

<div class="header-row">
  <div>
    <h1 data-i18n="app_title">Tempest AI — agent console</h1>
    <div class="sub" data-i18n="app_subtitle">EDINET 有価証券報告書 + yfinance. Two independent agents.</div>
  </div>
  <div class="lang-toggle" role="group" aria-label="Language">
    <button id="lang-en" class="active">EN</button>
    <button id="lang-ja">日本語</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="quiet" data-i18n="tab_quiet">Quiet Change</div>
  <div class="tab" data-tab="similar" data-i18n="tab_similar">Similar Company (IT 5250)</div>
</div>

<div id="tab-quiet" class="tab-panel active">

<div class="controls">
  <div>
    <label data-i18n="codes_label">Codes (comma-separated, 4-digit)</label>
    <input id="codes" type="text" value="6758, 9983, 9432, 8001, 9984">
  </div>
  <div>
    <label data-i18n="from_fy_label">From fiscal year</label>
    <input id="minYear" type="number" value="2020" min="2000" max="2100">
  </div>
  <label class="toggle-switch">
    <input id="runTests" type="checkbox">
    <span data-i18n="run_tests_label">Run accuracy tests</span>
  </label>
  <button id="run" data-i18n="run_btn">Run</button>
</div>

<div id="status" class="status"></div>
<div id="fetched" class="fetched" style="display:none"></div>
<div id="results"></div>

</div><!-- /tab-quiet -->

<div id="tab-similar" class="tab-panel">

<div class="controls">
  <div>
    <label data-i18n="sc_sector_label">Sector (JPX 33業種)</label>
    <select id="simSector">
      <option value="5250" selected>5250 — IT &amp; Communications / 情報・通信業</option>
      <option value="7050">7050 — Banking / 銀行業</option>
      <option value="7100">7100 — Securities &amp; Futures / 証券、商品先物取引業</option>
      <option value="7150">7150 — Insurance / 保険業</option>
      <option value="7200">7200 — Other Financial / その他金融業</option>
      <option value="8050">8050 — Real Estate / 不動産業</option>
      <option value="5050">5050 — Land Transport / 陸運業</option>

<script>
const $ = (s) => document.querySelector(s);
const fmt = (n) => n == null ? '—' : Number(n).toLocaleString('en-US', {maximumFractionDigits: 0});
const pct = (n) => n == null ? '—' : (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
const cls = (status) => status === 'profit' || status === 'positive' ? 'pos'
                       : status === 'loss' || status === 'negative' ? 'neg' : 'flat';

// Translate raw status keys (kept in EN in the JSON response) to display strings.
const trStatus = (s) => t(`profit_${s}`) !== `profit_${s}` ? t(`profit_${s}`)
                       : t(`direction_${s}`) !== `direction_${s}` ? t(`direction_${s}`)
                       : s;

function badge(text, status) {
  return `<span class="badge ${cls(status)}">${text}</span>`;
}

// Caches so language toggle can re-render without re-fetching.
let lastQuietData = null;
let lastSimilarData = null;

// Fetched-at timestamps (Date objects, set when each Run completes).
let lastQuietAt = null;
let lastSimilarAt = null;
const STALE_AFTER_MS = 30 * 60 * 1000;   // 30 min → mark as "stale, re-run"

function _relTime(ts) {
  if (!ts) return '';
  const dMs = Date.now() - ts.getTime();
  if (dMs >= STALE_AFTER_MS) return t('rel_stale');
  if (dMs < 30_000)        return t('rel_just_now');
  if (dMs < 60_000)        return t('rel_seconds', Math.floor(dMs / 1000));
  if (dMs < 60 * 60_000)   return t('rel_minutes', Math.floor(dMs / 60_000));
  return t('rel_hours', Math.floor(dMs / 3_600_000));
}

function _renderFetched(divId, ts) {
  const el = document.getElementById(divId);
  if (!el) return;
  if (!ts) { el.style.display = 'none'; return; }
  const timeStr = ts.toLocaleTimeString();
  const rel = _relTime(ts);
  el.textContent = t('fetched_at', timeStr, rel);
  el.classList.toggle('stale', rel === t('rel_stale'));
  el.style.display = 'block';
}

function refreshFetchedLines() {
  _renderFetched('fetched', lastQuietAt);
  _renderFetched('simFetched', lastSimilarAt);
}
setInterval(refreshFetchedLines, 30_000);   // keep relative time fresh


// Generic test-results panel renderer. `tr` is a dict with shape
// {checks: [...], passed: int, total: int}. `titleOverride` lets callers
// (Similar Company) replace the default "Tests passed/partial/failed" title
// with a domain-specific one (e.g., "Run integrity"). Returns '' for empty.
function renderTestResultsPanel(tr, titleOverride) {
  if (!tr || !Array.isArray(tr.checks) || tr.checks.length === 0) return '';
  const passed = tr.passed;
  const total = tr.total;
  const pct = passed / total;
  let cls, label;
  if (pct === 1)        { cls = 'pass';    label = t('test_passed'); }
  else if (pct >= 0.5)  { cls = 'partial'; label = t('test_partial'); }
  else                  { cls = 'fail';    label = t('test_failed'); }
  if (titleOverride) label = titleOverride + ' — ' + label;

  const items = tr.checks.map((c, i) => {
    const evidenceRows = c.evidence
      ? Object.entries(c.evidence).map(
          ([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`
        ).join('')
      : '';
    const evidenceBlock = evidenceRows
      ? `<button class="evidence-toggle" type="button"
                 onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block';
                          this.textContent = this.nextElementSibling.style.display === 'block' ? t_label('test_evidence_hide') : t_label('test_evidence_show');">
           ${t('test_evidence_show')}
         </button>
         <div class="test-evidence" style="display:none">
           <table>${evidenceRows}</table>
         </div>`
      : '';
    const label  = pick(c, 'name')   || c.name   || '';
    const detail = pick(c, 'detail') || c.detail || '';
    return `<li class="${c.passed ? 'ok' : 'bad'}">
      <span class="icon">${c.passed ? '✓' : '✗'}</span>
      <span class="label">${label}${detail ? ` <span class="detail">— ${detail}</span>` : ''}</span>
    </li>${evidenceBlock}`;
  }).join('');

  return `<div class="test-panel ${cls}">
    <div class="test-panel-head">
      <span class="dot"></span>
      <span>${label}</span>
      <span style="font-weight:400;color:var(--muted)">${t('test_summary', passed, total)}</span>
    </div>
    <ul class="test-panel-list">${items}</ul>
  </div>`;
}

// Quiet Change wrapper: per-pair test panel.
function renderTestPanel(pair) {
  return renderTestResultsPanel(pair && pair.test_results);
}

// Tiny helper so the inline onclick handler above can read i18n.
function t_label(key) { return t(key); }

// Render the inline "Revenue composition" header line — top segments by
// share-of-total, prev → curr. Mirrors the composition opener that the LLM
// is asked to write so the user gets the same scan even when the LLM skips
// the opener (which the coverage rule will then flag).
function renderCompositionRow(pair) {
  const segs = (pair && pair.segments) || [];
  if (!segs.length) return '';
  const totalPrev = segs.reduce((a, s) => a + (s.prev || 0), 0) || 1;
  const totalCurr = segs.reduce((a, s) => a + (s.curr || 0), 0) || 1;
  const ranked = segs
    .map(s => ({
      name: pick(s, 'name') || s.name || '',
      sharePrev: 100 * (s.prev || 0) / totalPrev,
      shareCurr: 100 * (s.curr || 0) / totalCurr,
    }))
    .sort((a, b) => b.shareCurr - a.shareCurr)
    .slice(0, 4);
  const inline = ranked
    .map(r => `<span class="seg-share">${r.name} ${r.sharePrev.toFixed(0)}%<span class="arrow">→</span>${r.shareCurr.toFixed(0)}%</span>`)
    .join(' &middot; ');
  return `<div class="composition-row">
    <span class="composition-label">${t('qc_composition_label')}</span>
    ${inline}
  </div>`;
}

// Render the segment breakdown table from XBRL extraction. Always renders
// a toggleable header so the section is visually consistent across pairs
// (including filers that don't disclose segment-level revenue).
function renderSegmentTable(pair) {
  const segs = (pair && pair.segments) || [];
  const count = segs.length;
  const headerLabel = count
    ? `${t('seg_section_h')} (${count})`
    : t('seg_section_h');

  let body = '';
  if (count === 0) {
    body = `<div class="segment-body">
      <p style="font-size:12px;color:var(--muted);margin:0;padding:10px 4px">
        ${t('seg_empty')}
      </p>
    </div>`;
  } else {
    const rows = segs.map(s => {
      const cls = s.delta > 0 ? 'seg-pos' : (s.delta < 0 ? 'seg-neg' : '');
      const segLabel = pick(s, 'name') || s.name || '';
      return `<tr>
        <td>${segLabel}</td>
        <td class="num">${fmt(s.prev)}</td>
        <td class="num">${fmt(s.curr)}</td>
        <td class="num ${cls}">${s.delta >= 0 ? '+' : ''}${fmt(s.delta)}</td>
        <td class="num ${cls}">${pct(s.delta_pct)}</td>
      </tr>`;
    }).join('');
    body = `<div class="segment-body"><table>
      <thead><tr>
        <th>${t('seg_th_segment')}</th>
        <th class="num">${t('seg_th_prev')}</th>
        <th class="num">${t('seg_th_curr')}</th>
        <th class="num">${t('seg_th_delta')}</th>
        <th class="num">${t('seg_th_delta_pct')}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  return `<div class="segment-section">
    <button type="button" class="segment-toggle">
      <span class="chev">▶</span>
      <span>${headerLabel}</span>
    </button>
    ${body}
  </div>`;
}

// Render the per-pair BS table next to the segment table. Always renders
// (per locked-in plan choice) — empty/unavailable BS shows the "no data"
// row rather than being hidden, so the section is visually consistent.
// Movers (asterisked in the LLM prompt) get bold rows + a visible marker
// so the reader can scan to the items the explanation may reference.
const BS_DISPLAY_ORDER = [
  'total_assets', 'tangible_fixed_assets', 'intangible_assets', 'goodwill',
  'inventory', 'trade_receivables', 'cash_and_equivalents',
  'interest_bearing_debt', 'equity', 'impairment_loss',
  'extraordinary_loss_total',
];

const PL_DISPLAY_ORDER = [
  'revenue', 'cost_of_sales', 'gross_profit', 'sga_expenses',
  'operating_income', 'ordinary_income', 'income_taxes',
  'net_income', 'comprehensive_income',
  'depreciation_amortization', 'rd_expense', 'basic_eps',
];

const PL_MARGIN_DISPLAY_ORDER = [
  'gross_margin_pct', 'op_margin_pct', 'ordinary_margin_pct', 'net_margin_pct',
];

function renderProfitLoss(pair) {
  const pl = pair && pair.pl_yoy;
  const headerLabel = t('pl_section_h');
  if (!pl || ((!pl.items || Object.keys(pl.items).length === 0)
              && (!pl.margins || Object.keys(pl.margins).length === 0))) {
    return `<div class="segment-section">
      <button type="button" class="segment-toggle">
        <span class="chev">▶</span>
        <span>${headerLabel}</span>
      </button>
      <div class="segment-body">
        <p style="font-size:12px;color:var(--muted);margin:0;padding:10px 4px">${t('pl_empty')}</p>
      </div>
    </div>`;
  }
  const items = pl.items || {};
  const margins = pl.margins || {};

  const moverCount = PL_DISPLAY_ORDER.reduce(
    (n, k) => n + (items[k] && items[k].is_mover ? 1 : 0), 0)
    + PL_MARGIN_DISPLAY_ORDER.reduce(
      (n, k) => n + (margins[k] && margins[k].is_mover ? 1 : 0), 0);
  const headerWithCount = moverCount > 0
    ? `${headerLabel} (${moverCount} ★)`
    : headerLabel;

  const itemRows = PL_DISPLAY_ORDER.map(k => {
    const item = items[k];
    if (!item) return '';
    const label = t('pl_item_' + k);
    // EPS is a per-share figure, not a yen value — format with 2 decimals.
    const isEps = (k === 'basic_eps');
    const prevStr = (item.prev == null) ? '—'
      : (isEps ? item.prev.toFixed(2) : fmt(item.prev));
    const currStr = (item.curr == null) ? '—'
      : (isEps ? item.curr.toFixed(2) : fmt(item.curr));
    const dpStr = (item.delta_pct == null) ? '—' : pct(item.delta_pct);
    const cls = (item.delta_pct != null)
      ? (item.delta_pct > 0 ? 'seg-pos' : (item.delta_pct < 0 ? 'seg-neg' : ''))
      : '';
    const moverMark = item.is_mover ? ' ★' : '';
    const rowStyle = item.is_mover ? ' style="font-weight:600"' : '';
    return `<tr${rowStyle}>
      <td>${label}${moverMark}</td>
      <td class="num">${prevStr}</td>
      <td class="num">${currStr}</td>
      <td class="num ${cls}">${dpStr}</td>
    </tr>`;
  }).join('');

  const marginRows = PL_MARGIN_DISPLAY_ORDER.map(k => {
    const m = margins[k];
    if (!m) return '';
    const label = t('pl_margin_' + k);
    const prevStr = (m.prev == null) ? '—' : m.prev.toFixed(2) + '%';
    const currStr = (m.curr == null) ? '—' : m.curr.toFixed(2) + '%';
    const ppStr = (m.pp_delta == null) ? '—'
      : (m.pp_delta >= 0 ? '+' : '') + m.pp_delta.toFixed(2) + 'pp';
    const cls = (m.pp_delta != null)
      ? (m.pp_delta > 0 ? 'seg-pos' : (m.pp_delta < 0 ? 'seg-neg' : ''))
      : '';
    const moverMark = m.is_mover ? ' ★' : '';
    const rowStyle = m.is_mover ? ' style="font-weight:600"' : '';
    return `<tr${rowStyle}>
      <td>${label}${moverMark}</td>
      <td class="num">${prevStr}</td>
      <td class="num">${currStr}</td>
      <td class="num ${cls}">${ppStr}</td>
    </tr>`;
  }).join('');

  const marginsTable = marginRows
    ? `<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--muted)">${t('pl_margins_h')}</div>
       <table>
         <thead><tr>
           <th>${t('pl_th_item')}</th>
           <th class="num">${t('pl_th_prev')}</th>
           <th class="num">${t('pl_th_curr')}</th>
           <th class="num">${t('pl_th_pp')}</th>
         </tr></thead>
         <tbody>${marginRows}</tbody>
       </table>`
    : '';

  const moverLegend = moverCount > 0
    ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;">${t('pl_mover_legend')}</div>`
    : '';

  return `<div class="segment-section">
    <button type="button" class="segment-toggle">
      <span class="chev">▶</span>
      <span>${headerWithCount}</span>
    </button>
    <div class="segment-body">
      <table>
        <thead><tr>
          <th>${t('pl_th_item')}</th>
          <th class="num">${t('pl_th_prev')}</th>
          <th class="num">${t('pl_th_curr')}</th>
          <th class="num">${t('pl_th_delta_pct')}</th>
        </tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
      ${marginsTable}
      ${moverLegend}
    </div>
  </div>`;
}

// Forward-outlook card — the agent's headline filter signal.
// Rendered above the bilingual explanation block so it's the first thing the
// reader sees. The judgment badge colour-codes the filter decision; the
// reasoning paragraph below quotes the LLM's evidence (with 勘定科目 + macro
// framing) so the user can audit why.
function renderOutlookCard(pair) {
  const judgment = pair && pair.outlook_judgment;
  if (!judgment) return '';
  const reason = pick(pair, 'outlook_reason') || '';
  let bg, fg, border;
  if (judgment === 'growth_likely') {
    bg = '#ecfdf5'; fg = '#065f46'; border = '#10b981';
  } else if (judgment === 'growth_unlikely') {
    bg = '#fef2f2'; fg = '#991b1b'; border = '#ef4444';
  } else {
    bg = '#fffbeb'; fg = '#92400e'; border = '#f59e0b';
  }
  const label = t('outlook_' + judgment);
  const reasonHtml = reason
    ? reason.toString().replace(/\n/g, '<br>')
    : `<i style="color:var(--muted)">${t('outlook_no_reason')}</i>`;
  return `<div style="margin:8px 0 12px;padding:10px 12px;background:${bg};border-left:4px solid ${border};border-radius:6px;">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:${fg};opacity:0.8;font-weight:600;margin-bottom:4px;">${t('outlook_section_h')}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="background:${border};color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;">${label}</span>
    </div>
    <div style="font-size:13px;color:${fg};line-height:1.5;">${reasonHtml}</div>
  </div>`;
}

// Fiscal-year label formatter — uses the YEAR-ENDED convention in both
// languages, which is what analysts and financial news (Bloomberg, Reuters,
// Nikkei, Sony's own English IR site) use:
//   EN: "FY2025"      — the period ending in calendar 2025
//   JA: "2025年3月期"  — the period ending March 2025 (期 = "year-ended")
// Note: the literal Japanese PDF often uses 「2024年度」 for the SAME period
// because 年度 is "year-started". Both labels point to the identical window
// (Apr 2024 - Mar 2025); we picked 期 because it's analyst-standard.
// `periodEnd` (optional, "YYYY-MM-DD") is used to derive the month — if
// missing, defaults to "3月期" (most Japanese fiscal years end in March).
function formatFY(year, periodEnd) {
  if (year == null) return '';
  if (LANG === 'ja') {
    let month = '3';
    if (periodEnd && periodEnd.length >= 7) {
      // periodEnd looks like "2025-03-31" → month = "3" (no leading zero)
      month = String(parseInt(periodEnd.substring(5, 7), 10));
    }
    return `${year}年${month}月期`;
  }
  return `FY${year}`;
}

// Bilingual picker. Handles BOTH naming conventions in the response:
//   * Similar Company features:  bare key = EN, '_ja' suffix = JA
//     (e.g. business_model / business_model_ja)
//   * Quiet Change explanations: '_en' suffix = EN, '_ja' suffix = JA
//     (e.g. explanation_simple_en / explanation_simple_ja)
// Try-order based on language; non-empty wins.
function pick(obj, key) {
  if (!obj) return '';
  const candidates = LANG === 'ja'
    ? [key + '_ja', key, key + '_en']
    : [key, key + '_en', key + '_ja'];
  for (const k of candidates) {
    const v = obj[k];
    if (v === undefined || v === null) continue;
    if (Array.isArray(v)) {
      if (v.length) return v;
    } else if (String(v).trim() !== '') {
      return v;
    }
  }
  return '';
}

function renderCompany(c, idx) {
  if (c.error) {
    return `<div class="company"><div class="toggle"><div class="left">
      <h2>${c.code}</h2><span class="code">${c.name || ''}</span>
    </div></div><div class="err">${c.error}</div></div>`;
  }
  const yearsRows = c.years.map(y =>
    `<tr><td>${formatFY(y.fiscal_year, y.period_end)}${y.chart_only ? ` <span class="badge" style="background:#fef3c7;color:#92400e;font-size:10px;padding:1px 6px;border-radius:6px;margin-left:4px;">${t('qc_chart_only_badge')}</span>` : ''}</td><td>${y.filing_date || '—'}</td><td class="num">${fmt(y.revenue)}</td></tr>`
  ).join('');

  const pairsRows = c.pairs.map(p => {
    const ho = p.history_only;
    const hoBadge = ho ? ` <span class="badge" style="background:#fef3c7;color:#92400e;font-size:10px;padding:1px 6px;border-radius:6px;margin-left:4px;">${t('qc_chart_only_badge')}</span>` : '';
    return `<tr${ho ? ' style="background:#fffbeb"' : ''}>
      <td>${formatFY(p.prev_fiscal_year, p.prev_period_end)} → ${formatFY(p.curr_fiscal_year, p.curr_period_end)}${hoBadge}</td>
      <td class="num">${fmt(p.prev_revenue)} → ${fmt(p.curr_revenue)}</td>
      <td class="num">${badge(pct(p.revenue_delta_pct), p.profit_status)}</td>
      <td>${badge(trStatus(p.profit_status), p.profit_status)}</td>
      <td>${ho ? '—' : p.curr_filing_date}</td>
      <td class="num">${ho ? '—' : pct(p.stock_5d_return_pct)}</td>
      <td>${ho ? '—' : badge(trStatus(p.stock_direction), p.stock_direction)}</td>
    </tr>`;
  }).join('');

  const explanations = c.pairs.map((p, pi) => {
    if (p.history_only) {
      return `<div class="pair" style="background:#fffbeb;border-left:3px solid #f59e0b;">
        <h4>${formatFY(p.prev_fiscal_year, p.prev_period_end)} → ${formatFY(p.curr_fiscal_year, p.curr_period_end)} &middot; ${pct(p.revenue_delta_pct)} &middot; <span class="badge" style="background:#fef3c7;color:#92400e;font-size:10px;padding:1px 6px;border-radius:6px;">${t('qc_chart_only_badge')}</span></h4>
        <div style="color:var(--muted);font-size:13px;margin:6px 0 4px;">${t('qc_history_only_note', String(p.prev_fiscal_year))}</div>
        ${renderTestPanel(p)}
      </div>`;
    }
    const noExpl = `<i style="color:var(--muted)">${t('qc_no_explanation')}</i>`;
    // Honest fallback: if a level wasn't returned by the LLM, say so explicitly
    // instead of duplicating the other level (which makes the toggle look broken).
    const rawSimple   = pick(p, 'explanation_simple');
    const rawAdvanced = pick(p, 'explanation_advanced') || pick(p, 'explanation');
    const simpleHtml = rawSimple
      ? rawSimple.toString().replace(/\n/g, '<br>')
      : noExpl;
    const advancedHtml = rawAdvanced
      ? rawAdvanced.toString().replace(/\n/g, '<br>')
      : noExpl;
    const warnings = (p.narrative_coverage_warnings || []);
    const headerWarn = warnings.length
      ? ` <span class="badge cov-warn-badge" title="${t('qc_coverage_warn_intro')}" style="background:#fef3c7;color:#92400e;font-size:10px;padding:1px 6px;border-radius:6px;cursor:help;">⚠ ${warnings.length}</span>`
      : '';
    const warnList = warnings.length
      ? `<div class="coverage-warn" style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 10px;margin:6px 0 10px;font-size:12px;color:#92400e;">
           <div style="font-weight:600;margin-bottom:4px;">⚠ ${t('qc_coverage_warn_label')} — ${t('qc_coverage_warn_intro')}</div>
           <ul style="margin:0;padding-left:18px;">${warnings.map(w => {
             const key = 'qc_coverage_rule_' + w.rule;
             const label = t(key);
             return `<li>${label === key ? w.message : label}</li>`;
           }).join('')}</ul>
         </div>`
      : '';
    const opPct = (p.op_profit_delta_pct == null) ? '' : ` &middot; ${t('qc_op_label')} ${pct(p.op_profit_delta_pct)}`;
    // Stock-response anomaly badge — covers two cases:
    //   "divergence"    — profit and stock moved in opposite directions
    //   "weak_response" — same direction but stock barely reacted (under-reaction)
    // Fall back to the legacy boolean for older payloads without the class field.
    const respClass = p.stock_response_class || (p.profit_stock_divergence ? 'divergence' : null);
    let divergenceBadge = '';
    if (respClass === 'divergence') {
      divergenceBadge = ` <span class="div-flag-badge" title="${t('qc_divergence_tooltip').replace(/"/g,'&quot;')}">⚠ ${t('qc_divergence_badge')}</span>`;
    } else if (respClass === 'weak_response') {
      divergenceBadge = ` <span class="div-flag-badge" style="background:#fef3c7;color:#92400e;border-color:#fde68a" title="${t('qc_weak_response_tooltip').replace(/"/g,'&quot;')}">⚠ ${t('qc_weak_response_badge')}</span>`;
    }
    return `<div class="pair">
      <h4>${formatFY(p.prev_fiscal_year, p.prev_period_end)} → ${formatFY(p.curr_fiscal_year, p.curr_period_end)} &middot; ${pct(p.revenue_delta_pct)}${opPct} &middot; ${pct(p.stock_5d_return_pct)}${divergenceBadge}${headerWarn}</h4>
      ${warnList}
      ${renderOutlookCard(p)}
      ${renderCompositionRow(p)}
      ${(p.segments && p.segments.length)
        ? `<div class="chart-wrap composition-chart-wrap"><canvas id="comp-${idx}-${pi}" height="80"></canvas></div>`
        : ''}
      <div class="explain-block">
        <div class="level-toggle inline-level-toggle" role="group" aria-label="Explanation level">
          <button type="button" class="active" data-level="simple">${t('qc_explain_simple')}</button>
          <button type="button" data-level="advanced">${t('qc_explain_advanced')}</button>
        </div>
        <span class="lvl-simple"   style="display:inline">${simpleHtml}</span>
        <span class="lvl-advanced" style="display:none">${advancedHtml}</span>
      </div>
      ${renderSegmentTable(p)}
      ${renderProfitLoss(p)}
      ${renderBalanceSheet(p)}
      ${renderTestPanel(p)}
    </div>`;
  }).join('');

  return `
    <div class="company" id="co-${idx}">
      <div class="toggle" onclick="document.getElementById('co-${idx}').classList.toggle('open')">
        <div class="left">
          <h2>${c.name || c.code}</h2>
          <span class="code">${c.code} &middot; ${t('qc_card_summary', c.years.length, c.pairs.length)}</span>
        </div>
        <span class="chev">▶</span>
      </div>
      <div class="body">
        ${(c.fetch_report && c.fetch_report.downloaded_years && c.fetch_report.downloaded_years.length) ? `<div class="restated-note" style="border-color:#10b981;background:#ecfdf5;color:#065f46">${t('qc_autofetch_note', c.fetch_report.downloaded_years)}</div>` : ''}
        ${(c.fetch_report && c.fetch_report.still_missing_years && c.fetch_report.still_missing_years.length) ? `<div class="restated-note">${t('qc_autofetch_missing', c.fetch_report.still_missing_years)}</div>` : ''}
        ${c.using_restated_history ? `<div class="restated-note">${t('qc_restated_note')}</div>` : ''}
        ${(c.history_only_years && c.history_only_years.length) ? `<div class="restated-note">${t('qc_history_only_note', c.history_only_years.join(', '))}</div>` : ''}
        <div class="chart-wrap"><canvas id="chart-${idx}" height="120"></canvas></div>

        <h3 style="margin:16px 0 6px;font-size:14px;">${t('qc_table_h1')}</h3>
        <table>
          <thead><tr>
            <th>${t('qc_th_years')}</th><th>${t('qc_th_revenue')}</th><th>${t('qc_th_delta')}</th><th>${t('qc_th_status')}</th>
            <th>${t('qc_th_filing')}</th><th>${t('qc_th_stock5d')}</th><th>${t('qc_th_direction')}</th>
          </tr></thead>
          <tbody>${pairsRows}</tbody>
        </table>

        <h3 style="margin:18px 0 6px;font-size:14px;">${t('qc_explain_h')}</h3>
        ${explanations}

        <details><summary>${t('qc_raw_summary')}</summary>
          <table style="margin-top:8px">
            <thead><tr><th>${t('qc_raw_th_fy')}</th><th>${t('qc_raw_th_filing')}</th><th class="num">${t('qc_raw_th_revenue')}</th></tr></thead>
            <tbody>${yearsRows}</tbody>
          </table>
        </details>
      </div>
    </div>`;
}

function renderQuietResults(data) {
  $('#status').textContent = t('qc_status_done', data.count);
  $('#results').innerHTML = data.results.map((c, i) => renderCompany(c, i)).join('');
  data.results.forEach((c, i) => {
    if (c.error) return;
    drawChart('chart-' + i, c);
    (c.pairs || []).forEach((p, pi) => {
      if (!p.history_only && p.segments && p.segments.length) {
        drawCompositionChart('comp-' + i + '-' + pi, p);
      }
    });
  });
  const first = document.querySelector('#tab-quiet .company');
  if (first) first.classList.add('open');
}

// Stacked horizontal bars showing each segment's share of total revenue for
// prev vs curr year — same colour for the same segment across both bars so
// the eye reads composition shift, not absolute size.
const _COMP_PALETTE = [
  '#5aa9ff', '#2ecc71', '#f1c40f', '#e74c3c', '#9b59b6',
  '#1abc9c', '#e67e22', '#3498db', '#95a5a6', '#34495e',
];
function drawCompositionChart(canvasId, pair) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const segs = pair.segments || [];
  if (!segs.length) return;
  const totalPrev = segs.reduce((a, s) => a + (s.prev || 0), 0) || 1;
  const totalCurr = segs.reduce((a, s) => a + (s.curr || 0), 0) || 1;
  // Sort by current share descending so the largest segments anchor the
  // bottom of each stacked bar (Chart.js renders datasets in array order).
  const ranked = segs
    .map(s => ({
      name: pick(s, 'name') || s.name || '',
      sharePrev: 100 * (s.prev || 0) / totalPrev,
      shareCurr: 100 * (s.curr || 0) / totalCurr,
    }))
    .sort((a, b) => b.shareCurr - a.shareCurr);
  const datasets = ranked.map((r, i) => ({
    label: r.name,
    data: [r.sharePrev, r.shareCurr],
    backgroundColor: _COMP_PALETTE[i % _COMP_PALETTE.length],
    borderWidth: 0,
  }));
  new Chart(ctx, {
    type: 'bar',
    data: { labels: [LANG === 'ja' ? '前期' : 'Prev', LANG === 'ja' ? '当期' : 'Curr'], datasets },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#c8ccd4', boxWidth: 10, font: { size: 10 } } },
        title: { display: true, text: t('qc_composition_chart_title'),
                 color: '#c8ccd4', font: { size: 11 } },
        tooltip: { callbacks: { label: (ti) => `${ti.dataset.label}: ${ti.parsed.x.toFixed(1)}%` } },
      },
      scales: {
        x: { stacked: true, max: 100, ticks: { color: '#8a93a3',
              callback: v => v + '%' }, grid: { color: '#2a2f3a' } },
        y: { stacked: true, ticks: { color: '#8a93a3' }, grid: { color: '#2a2f3a' } },
      },
    },
  });
}

function drawChart(canvasId, c) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const labels = c.years.map(y => formatFY(y.fiscal_year, y.period_end));
  const revenue = c.years.map(y => y.revenue / 1e9);   // billions
  // Stock 5d return aligned to curr_fiscal_year of each pair
  const stockMap = Object.fromEntries(c.pairs.map(p => [p.curr_fiscal_year, p.stock_5d_return_pct]));
  const stock = c.years.map(y => stockMap[y.fiscal_year] ?? null);

  new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type: 'bar', label: t('chart_revenue'), data: revenue, yAxisID: 'y',
          backgroundColor: 'rgba(90,169,255,.55)', borderColor: 'rgba(90,169,255,1)', borderWidth: 1 },
        { type: 'line', label: t('chart_stock'), data: stock, yAxisID: 'y1',
          borderColor: '#2ecc71', backgroundColor: '#2ecc71', tension: .25,
          spanGaps: true, pointRadius: 4 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,

        y1: { position: 'right', ticks: { color: '#2ecc71' }, grid: { drawOnChartArea: false },

}

async function run() {
  const codes = $('#codes').value.split(',').map(s => s.trim()).filter(Boolean);
  const minYear = parseInt($('#minYear').value, 10);
  if (!codes.length) { $('#status').textContent = t('qc_status_no_codes'); return; }

  const btn = $('#run'); btn.disabled = true;
  $('#status').textContent = t('qc_status_running', codes.length, minYear);
  $('#results').innerHTML = '';

  const runTests = $('#runTests').checked;
  try {
    const r = await fetch('/quiet-change/multi-year', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ codes, min_year: minYear, run_tests: runTests }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    lastQuietData = data;
    lastQuietAt = new Date();
    renderQuietResults(data);
    refreshFetchedLines();
  } catch (e) {
    $('#status').textContent = t('qc_status_error', e.message);
  } finally {
    btn.disabled = false;
  }
}

$('#run').addEventListener('click', run);


// ============================================================
// Similar Company tab
// ============================================================
function relTier(score) {
  return score >= 70 ? 'hi' : score >= 40 ? 'md' : 'lo';
}
// Render a small SVG sparkline for one matched anchor's "what came next"
// trajectory (indexed to phase-end = 100). Pure inline SVG — no Chart.js
// canvas-id juggling. Kept compact so multiple cards fit comfortably in
// the rationale column.
function phaseTrajSparkline(traj, w, h) {
  if (!traj || traj.length < 2) return '';
  const pad = 6;
  const yVals = traj.map(p => p.revenue_indexed);
  const yMin = Math.min(100, ...yVals);
  const yMax = Math.max(100, ...yVals);
  const yRange = (yMax - yMin) || 1;
  const xStep = (w - 2 * pad) / Math.max(1, traj.length - 1);
  const pts = traj.map((p, i) => {
    const x = pad + i * xStep;
    const y = h - pad - ((p.revenue_indexed - yMin) / yRange) * (h - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  // Baseline at indexed=100 so the eye sees "what changed from phase end."
  const yBase = h - pad - ((100 - yMin) / yRange) * (h - 2 * pad);
  const dots = traj.map((p, i) => {
    const x = pad + i * xStep;
    const y = h - pad - ((p.revenue_indexed - yMin) / yRange) * (h - 2 * pad);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.2" fill="#c8b3e0"/>`;
  }).join('');
  return `<svg class="phase-traj-svg" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad}" y1="${yBase.toFixed(1)}" x2="${w - pad}" y2="${yBase.toFixed(1)}"
          stroke="#5a5a6a" stroke-width="1" stroke-dasharray="3,2"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="#c8b3e0" stroke-width="1.6"/>
    ${dots}
  </svg>`;
}

// Render the Phase-match panel for ONE candidate row. Returns empty string
// when phase_matching is null OR trajectory_similarity is non-null (the
// phase-match panel is a fallback, not a parallel signal).
function renderPhaseMatchPanel(r) {
  if (r.trajectory_similarity != null) return '';
  const pm = r.phase_matching;
  if (!pm) return '';
  const matches = pm.matched_anchors || [];
  if (!matches.length) {
    return `<div class="phase-match-panel">
      <div class="phase-header">
        <span class="phase-label">${t('sc_phase_label')}</span>
      </div>
      <p class="phase-disclaimer">${t('sc_phase_disclaimer')}</p>
      <p style="color:var(--muted);font-size:12px;">${t('sc_phase_no_anchors')}</p>
    </div>`;
  }
  const conf = pm.confidence ?? 0;
  const cap = pm.confidence_cap ?? 40;
  const breakdown = pm.confidence_breakdown || {};
  const bandHtml = pm.prediction
    ? `<div class="phase-prediction-band">${t('sc_phase_prediction_band',
        pm.prediction.n_anchors_used,
        (pm.prediction.p25_3y_cagr * 100).toFixed(1) + '%',
        (pm.prediction.median_3y_cagr * 100).toFixed(1) + '%',
        (pm.prediction.p75_3y_cagr * 100).toFixed(1) + '%')}</div>`
    : '';
  const cards = matches.map(m => {
    const traj = m.subsequent_revenue_trajectory || [];
    const cagrPct = m.subsequent_3y_cagr != null
      ? (m.subsequent_3y_cagr * 100).toFixed(1) + '%'
      : '—';
    const narr = pick(m, 'narrative') || '';
    return `<div class="phase-anchor-card">
      <div class="pa-head">
        <div>
          <span class="pa-name">${m.code} ${m.name}</span>
          <span class="pa-window">${t('sc_phase_window', m.matched_phase_window.start_fy, m.matched_phase_window.end_fy)}</span>
        </div>
        <span class="pa-cagr">${t('sc_phase_subseq_cagr', cagrPct)}</span>
      </div>
      ${phaseTrajSparkline(traj, 260, 60)}
      ${narr ? `<div class="pa-narr">${narr}</div>` : ''}
    </div>`;
  }).join('');
  const tip = t('sc_phase_confidence_tip', breakdown).replace(/"/g, '&quot;');
  return `<div class="phase-match-panel">
    <div class="phase-header">
      <span class="phase-label">${t('sc_phase_label')}</span>
      <span class="phase-confidence-pill" title="${tip}">${t('sc_phase_confidence', conf, cap)}</span>
    </div>
    <p class="phase-disclaimer">${t('sc_phase_disclaimer')}</p>
    ${bandHtml}
    ${cards}
  </div>`;
}

function relPill(score) {
  return `<span class="rel-pill rel-${relTier(score)}">${score}/100</span>`;
}
function sizePill(score) {
  // Neutral palette intentionally — size-similarity is a secondary signal and
  // should not visually compete with the primary relatedness pill.
  if (score == null) return '';
  return `<span class="size-pill" title="${t('sc_size_tooltip').replace(/"/g,'&quot;')}">${score}/100</span>`;
}
function trajPill(score) {
  // Tertiary signal — same neutral palette as size, slightly different shape
  // so the user sees it as "another companion metric" rather than a primary.
  if (score == null) return '';
  return `<span class="size-pill" title="${t('sc_trajectory_tooltip').replace(/"/g,'&quot;')}">${score}/100</span>`;
}
// Background colour for a heatmap cell — maps the same tier to a stronger fill.
function relCellBg(score) {
  const t = relTier(score);
  if (t === 'hi') return `rgba(46,204,113,${0.25 + 0.55 * (score - 70) / 30})`;
  if (t === 'md') return `rgba(241,196,15,${0.18 + 0.40 * (score - 40) / 30})`;
  return `rgba(231,76,60,${0.18 + 0.30 * Math.max(0, score) / 40})`;
}

function chips(items) {
  return (items || []).map(x => `<span class="feature-chip">${x}</span>`).join(' ') || '<span style="color:var(--muted)">—</span>';
}

const trSize = (s) => t('size_' + s) !== ('size_' + s) ? t('size_' + s) : (s || '').toUpperCase();

// Score-tier legend rendered above the heatmap.
function renderScoreLegend() {
  return `<div class="score-legend">
    <div class="item legend-hi"><span class="swatch"></span>${t('sc_score_legend_high')}</div>
    <div class="item legend-md"><span class="swatch"></span>${t('sc_score_legend_mid')}</div>
    <div class="item legend-lo"><span class="swatch"></span>${t('sc_score_legend_low')}</div>
  </div>`;
}

// Global heatmap: rows = anchors, columns = full candidate universe.
// Each cell shows the (anchor, candidate) relatedness, coloured by tier.
// A blank cell means that pair was not scored (candidate was assigned to a
// different anchor and we only score against the assigned anchor here).
function renderHeatmap(data) {
  const anchors = data.anchors || [];
  const candidates = data.candidates || [];
  if (!anchors.length || !candidates.length) return '';
  // Build (anchor, candidate) → score map. The candidate's row carries
  // its assigned anchor's relatedness; runner-up scores live in
  // r.other_anchor_scores (we use those to populate the off-diagonal cells).
  const scoreMap = {};
  for (const aCode of Object.keys(data.rankings || {})) {
    for (const r of data.rankings[aCode]) {
      scoreMap[`${aCode}|${r.code}`] = r.relatedness;
      for (const ru of (r.other_anchor_scores || [])) {
        scoreMap[`${ru.anchor_code}|${r.code}`] = ru.relatedness;
      }
    }
  }
  const headCells = candidates.map(c =>
    `<th title="${c.code} ${c.name}">${c.code}</th>`).join('');
  const rows = anchors.map(a => {
    const cells = candidates.map(c => {
      const s = scoreMap[`${a.code}|${c.code}`];
      if (s === undefined || s === null) {
        return `<td class="cell empty">—</td>`;
      }
      return `<td class="cell" style="background:${relCellBg(s)}"
                  title="${a.name} ↔ ${c.name}: ${s}/100">${s}</td>`;
    }).join('');
    return `<tr><td class="row-label">${a.code} ${a.name}</td>${cells}</tr>`;
  }).join('');
  return `<div class="heatmap-section">
    <h3>${t('sc_heatmap_title')}</h3>
    ${renderScoreLegend()}
    <div class="heatmap-wrap">
      <table class="heatmap">
        <thead><tr><th class="row-label"></th>${headCells}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// Per-anchor horizontal bar chart comparing latest revenues (anchor + each
// candidate). Log scale because revenues span 4-5 orders of magnitude in the
// IT pool (¥1B → ¥10T). Anchor's bar gets the accent color so the reader can
// instantly see which candidates are in the same weight class.
function drawRevenueCompareChart(canvasId, anchor, ranking) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const rows = [
    { label: `${anchor.name} (${LANG === 'ja' ? 'アンカー' : 'anchor'})`,
      value: anchor.latest_revenue / 1e9, isAnchor: true },
    ...[...ranking]
      .sort((a, b) => b.latest_revenue - a.latest_revenue)
      .map(r => ({ label: r.name, value: r.latest_revenue / 1e9, isAnchor: false })),
  ];
  const labels = rows.map(r => r.label);
  const values = rows.map(r => r.value);
  const colors = rows.map(r => r.isAnchor
    ? 'rgba(99,102,241,.75)'   // accent (indigo) for the anchor
    : 'rgba(148,163,184,.50)'); // neutral grey for candidates
  new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (item) =>
          `¥${item.parsed.x >= 1000 ? (item.parsed.x/1000).toFixed(2) + 'T' : item.parsed.x.toFixed(1) + 'B'}` } },
      },
      scales: {
        x: { type: 'logarithmic', min: 1,
             title: { display: true, text: t('sc_revenue_axis_label'), color: '#8a93a3', font: { size: 10 } },
             ticks: { color: '#8a93a3',
                      callback: (v) => v >= 1000 ? (v/1000) + 'T' : v + 'B' },
             grid: { color: '#2a2f3a' } },
        y: { ticks: { color: '#e6e8eb', font: { size: 11 } }, grid: { display: false } },
      },
    },
  });
}

// Per-anchor multi-line revenue trajectory chart (Chart.js). Anchor + top-N
// candidates by relatedness, one line each, fiscal-year X.
//
// IMPORTANT: each company's series is NORMALIZED — rebased to 100 at its
// earliest available year in the window. The chart's purpose is shape
// comparison (who grew, who declined, who held flat), and shapes are only
// readable when all series share a common starting point. Raw revenues
// would put NTT at ¥13T and small-caps at ¥3B — 4 orders of magnitude apart
// — and you'd see the GAP, not the SHAPE. The latest-revenue snapshot bar
// chart (rendered above this one) covers absolute-magnitude comparison.
//
// Cap at 6 lines (anchor + 5 candidates) to keep the chart readable;
// candidates picked by highest relatedness so the lines that matter most stay.
function drawTrajectoryChart(canvasId, anchor, ranking) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const top = [...ranking]
    .sort((a, b) => b.relatedness - a.relatedness)
    .slice(0, 5);
  const series = [{ name: anchor.name, hist: anchor.revenue_history || [], isAnchor: true },
                  ...top.map(r => ({ name: r.name, hist: r.revenue_history || [], isAnchor: false }))];
  // Build the union of fiscal years across all series so x-axis lines up.
  const allYears = new Set();
  series.forEach(s => s.hist.forEach(p => allYears.add(p.fiscal_year)));
  const yearLabels = [...allYears].sort();

  // Distinct neutral-bright palette for non-anchor lines so 5 candidates stay
  // distinguishable without becoming visually noisy.
  const palette = ['#94a3b8', '#fbbf24', '#34d399', '#f472b6', '#60a5fa'];
  const datasets = series.map((s, i) => {
    const byYear = Object.fromEntries(s.hist.map(p => [p.fiscal_year, p.revenue]));
    // Find this series' earliest year (within the window) and rebase to 100.
    // Each company anchors to its own first year so relative growth is
    // readable independent of absolute scale.
    const firstYear = yearLabels.find(y => byYear[y] != null);
    const base = firstYear != null ? byYear[firstYear] : null;
    const indexed = yearLabels.map(y => {
      const v = byYear[y];
      return (v != null && base) ? (v / base) * 100 : null;
    });
    return {
      label: s.name,
      data: indexed,
      borderColor: s.isAnchor ? '#a5b4fc' : palette[(i - 1) % palette.length],
      backgroundColor: s.isAnchor ? 'rgba(165,180,252,.12)' : 'transparent',
      borderWidth: s.isAnchor ? 2.5 : 1.6,
      pointRadius: 3, pointHoverRadius: 5,
      tension: 0.15,
      // spanGaps: false — do NOT interpolate through missing years. A company
      // with only FY2024+FY2025 on disk should visibly show as a 1-segment
      // line, not a fake continuous trajectory back to 2020. Honest gaps make
      // the data-coverage problem obvious instead of hiding it.
      spanGaps: false,
    };
  });
  new Chart(ctx, {
    type: 'line',
    data: { labels: yearLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { color: '#cbd5e1', font: { size: 10 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: (item) =>
          `${item.dataset.label}: ${item.parsed.y.toFixed(1)} (vs 100 baseline)` } },
      },
      scales: {
        x: { title: { display: true, text: t('sc_trajectory_axis_x'), color: '#8a93a3', font: { size: 10 } },
             ticks: { color: '#8a93a3' }, grid: { color: '#2a2f3a' } },
        y: { title: { display: true, text: t('sc_trajectory_axis_y'), color: '#8a93a3', font: { size: 10 } },
             ticks: { color: '#8a93a3' }, grid: { color: '#2a2f3a' } },
      },
    },
  });
}

// Per-anchor horizontal bar chart of candidate relatedness (Chart.js).
function drawAnchorBarChart(canvasId, ranking) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const sorted = [...ranking].sort((a, b) => b.relatedness - a.relatedness);
  const labels = sorted.map(r => r.name);
  const values = sorted.map(r => r.relatedness);
  const colors = sorted.map(r => {
    const tier = relTier(r.relatedness);
    return tier === 'hi' ? 'rgba(46,204,113,.65)'
         : tier === 'md' ? 'rgba(241,196,15,.65)'
         : 'rgba(231,76,60,.55)';
  });
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: t('sc_th_relatedness'), data: values,
                   backgroundColor: colors, borderWidth: 0 }],
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        label: (item) => `${item.parsed.x}/100`,
      }}},
      scales: {
        x: { min: 0, max: 100, ticks: { color: '#8a93a3', stepSize: 20 },
             grid: { color: '#2a2f3a' } },
        y: { ticks: { color: '#e6e8eb' }, grid: { display: false } },
      },
    },
  });
}

            <th>${t('sc_th_code')}</th>
            <th title="${t('sc_tooltip_candidate')}">${t('sc_th_candidate')}</th>
            <th>${t('sc_th_revenue')}</th>
            <th title="${t('sc_tooltip_relatedness')}">${t('sc_th_scores')}</th>
            <th>${t('sc_th_shared')}</th>
            <th>${t('sc_th_rationale')}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${anchorTests ? renderTestResultsPanel(anchorTests, t('sc_anchor_tests_panel_title')) : ''}
      </div>
    </div>`;
}

function renderSimilarResults(data) {
  if (data.error) {
    $('#simStatus').textContent = t('sc_status_error', data.error);
    $('#simResults').innerHTML = '';
    return;
  }
  $('#simStatus').textContent = t('sc_status_done',
    data.universe_count, data.anchors.length, data.candidates.length);
  // Help banner + (optional) run-integrity test panel + heatmap + per-anchor cards.
  const heatmap = renderHeatmap(data);
  const runTestsPanel = data.test_results
    ? renderTestResultsPanel(data.test_results, t('sc_run_tests_panel_title'))
    : '';
  // Pass the per-anchor test results into renderAnchor so it can render the
  // anchor-level quality panel inside each card.
  const anchorTests = data.anchor_test_results || {};
  const cards = data.anchors.map((a, i) =>
    renderAnchor(a, data.rankings[a.code] || [], i, anchorTests[a.code])
  ).join('');
  $('#simResults').innerHTML = `
    <div class="help-banner">${t('sc_help_banner')}</div>
    ${runTestsPanel}
    ${heatmap}
    ${cards}
  `;
  // Open the first card and instantiate its bar chart; other charts render
  // when their cards open. Quick-and-correct: instantiate all on first paint.
  const first = document.querySelector('#tab-similar .company');
  if (first) first.classList.add('open');
  data.anchors.forEach((a, i) => {
    const ranking = data.rankings[a.code] || [];
    if (ranking.length) drawAnchorBarChart(`sim-chart-${i}`, ranking);
  });

  // Wire the per-anchor "Detailed view" toggles. Revenue-comparison chart is
  // lazily rendered the first time the toggle is turned on (Chart.js cannot
  // draw on a display:none canvas — must defer until the wrapper is visible).
  const drawnRevenueCharts = new Set();
  document.querySelectorAll('#tab-similar .detail-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = btn.closest('.anchor-body');
      if (!body) return;
      const idx = parseInt(body.getAttribute('data-anchor-idx'), 10);
      const isOn = body.classList.toggle('detailed-on');
      btn.classList.toggle('on', isOn);
      if (isOn && !drawnRevenueCharts.has(idx)) {
        const a = data.anchors[idx];
        const ranking = data.rankings[a.code] || [];
        if (ranking.length) {
          drawRevenueCompareChart(`rev-chart-${idx}`, a, ranking);
          drawTrajectoryChart(`traj-chart-${idx}`, a, ranking);
          drawnRevenueCharts.add(idx);
        }
      }
    });
  });
}

async function runSimilar() {
  const sector_code = $('#simSector').value || '5250';
  const n_anchors = parseInt($('#simAnchors').value, 10);
  const min_year = parseInt($('#simMinYear').value, 10);
  const run_tests = $('#simRunTests').checked;
  const btn = $('#simRun'); btn.disabled = true;
  $('#simStatus').textContent = t('sc_status_running', n_anchors, min_year);
  $('#simResults').innerHTML = '';

  try {
    const r = await fetch('/similar-company', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ n_anchors, min_year, run_tests, sector_code }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    lastSimilarData = data;
    lastSimilarAt = new Date();
    renderSimilarResults(data);
    refreshFetchedLines();
  } catch (e) {
    $('#simStatus').textContent = t('sc_status_error', e.message);
  } finally {
    btn.disabled = false;
  }
}

$('#simRun').addEventListener('click', runSimilar);

// Populate per-sector counts in the dropdown so the user can see at a glance
// which sectors have ingested data and which are empty. Sub-second backend
// scan (no XBRL parsing) — refires when min_year changes since counts are
// min_year-dependent.
async function refreshSectorCounts() {
  const select = $('#simSector');
  if (!select) return;
  const minYear = parseInt($('#simMinYear').value, 10) || 2020;
  try {
    const r = await fetch(`/sector-counts?min_year=${minYear}`);
    if (!r.ok) return;
    const data = await r.json();
    const counts = data.counts || {};
    for (const opt of select.options) {
      // Strip any prior "(N companies)" suffix before re-appending.
      opt.textContent = opt.textContent.replace(/\s*[·•]\s*\(\d+(?:\s*\w+)?\)\s*$/, '').trim();
      const n = counts[opt.value] ?? 0;
      const suffix = n === 0
        ? ` · (${LANG === 'ja' ? '0社 — 未取得' : '0 — not ingested'})`
        : ` · (${n}${LANG === 'ja' ? '社' : ''})`;
      opt.textContent = opt.textContent + suffix;
      opt.style.color = n === 0 ? '#666' : '';
      opt.style.fontStyle = n === 0 ? 'italic' : '';
    }
  } catch (e) {
    // Non-fatal — dropdown still works without counts.
    console.warn('sector-counts fetch failed:', e);
  }
}

// Fire on page load and whenever the user changes the from-FY input (counts
// depend on min_year — pre-2020 IPOs would shift sector populations).
refreshSectorCounts();
$('#simMinYear').addEventListener('change', refreshSectorCounts);

// ============================================================
// language toggle wiring + initial paint
// ============================================================
document.getElementById('lang-en').addEventListener('click', () => setLang('en'));
document.getElementById('lang-ja').addEventListener('click', () => setLang('ja'));
// Per-pair Segment breakdown toggle (event delegation on document).
document.addEventListener('click', (e) => {
  const segBtn = e.target.closest('.segment-toggle');
  if (segBtn) {
    e.preventDefault();
    const section = segBtn.closest('.segment-section');
    if (section) section.classList.toggle('open');
    return;
  }
});

// Per-pair Simple/Advanced toggle (event delegation on document).
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.inline-level-toggle button');
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const block = btn.closest('.explain-block');
  if (!block) { console.warn('explain-block not found for toggle click'); return; }
  const wantSimple = btn.dataset.level === 'simple';
  // Update active state on both buttons in this group only.
  block.querySelectorAll('.inline-level-toggle button').forEach(b => {
    const active = b.dataset.level === btn.dataset.level;
    b.classList.toggle('active', active);
    b.classList.toggle('adv', active && !wantSimple);
  });
  // Show / hide the matching span within THIS pair's explain-block only.
  const sEl = block.querySelector('.lvl-simple');
  const aEl = block.querySelector('.lvl-advanced');
  if (sEl) sEl.style.display = wantSimple ? 'inline' : 'none';
  if (aEl) aEl.style.display = wantSimple ? 'none' : 'inline';
  console.log(`[explain-toggle] ${wantSimple ? 'simple' : 'advanced'} shown`,
              { simpleVisible: !!sEl && sEl.style.display !== 'none',
                advancedVisible: !!aEl && aEl.style.display !== 'none' });
});

applyI18n();
</script>
